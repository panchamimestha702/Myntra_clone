<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myntra Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header>

<div class="logo">
<h2>Myntra</h2>
</div>

<nav>
<a href="#">MEN</a>
<a href="#">WOMEN</a>
<a href="#">KIDS</a>
<a href="#">HOME</a>
<a href="#">BEAUTY</a>
<a href="#">STUDIO</a>
</nav>

<div class="search">
<i class="fa fa-search"></i>
<input type="text" placeholder="Search products">
</div>

<div class="icons">
<i class="fa-regular fa-user"></i>
<i class="fa-regular fa-heart"></i>
<i class="fa-solid fa-bag-shopping"></i>
</div>

</header>

<section class="banner">
<h1>Big Fashion Sale</h1>
<p>50-80% OFF</p>
<button>Shop Now</button>
</section>

<h2 class="title">Trending Products</h2>

<section class="products">

<div class="card">
<img src="https://picsum.photos/250/300?1">
<h3>Roadster T-Shirt</h3>
<p>₹699</p>
<button>Add to Bag</button>
</div>

<div class="card">
<img src="https://picsum.photos/250/300?2">
<h3>Nike Shoes</h3>
<p>₹2499</p>
<button>Add to Bag</button>
</div>

<div class="card">
<img src="images/fashion.jpg">
<h3>Women's Dress</h3>
<p>₹1499</p>
<button>Add to Bag</button>
</div>

<div class="card">
<img src="https://picsum.photos/250/300?4">
<h3>Levis Jeans</h3>
<p>₹1899</p>
<button>Add to Bag</button>
</div>

</section>

<footer>

<h3>Myntra Clone</h3>



</footer>

</body>
</html>
